    <h3 style="margin: 0;">Tab Memory</h3>
    <div id="total-memory">Loading...</div>
  </div>

      <div class="progress-fill" id="memory-progress"></div>
    </div>
  </div>
  
  <div id="tabs-list">
  </div>
  
  <div class="controls">
    <button id="refresh-btn">🔄 Refresh</button>
    <button id="sort-btn">Sort by Memory ▼</button>
    <button id="cleanup-btn">🧹 Close Heavy Tabs</button>
